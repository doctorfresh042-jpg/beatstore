<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Doctor Fresh</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#0E0D0C",
            surface: "#1A1816",
            surface2: "#221F1C",
            bone: "#F2EFE9",
            bonedim: "#B8B2A7",
            tape: "#FF4D00",
          },
          fontFamily: {
            display: ["Anton", "sans-serif"],
            body: ["Inter", "sans-serif"],
            mono: ["'JetBrains Mono'", "monospace"],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { background: #0E0D0C; color: #F2EFE9; font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex flex-col p-5 max-w-6xl mx-auto">

  <header class="border-b border-surface2 pb-4 flex items-center justify-between">
    <h1 class="font-display text-2xl tracking-wide">PROD BY <span class="text-tape">DOCTOR FRESH</span></h1>
    <span class="font-mono text-xs text-bonedim/50">Admin</span>
  </header>

  <!-- DEBUG LOG PANEL (will appear below) -->
  <div id="debug-log" style="background:#1a1816;color:#ff6b6b;padding:10px;font-size:12px;white-space:pre-wrap;max-height:200px;overflow:auto;border:1px solid #444;margin-top:10px;border-radius:6px;font-family:monospace;"></div>

  <section class="mt-6 bg-surface border border-surface2 rounded-xl p-5">
    <h2 class="font-display text-xl tracking-wide">Upload New Beat</h2>
    <form id="upload-form" class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label for="f-title" class="block font-mono text-xs uppercase tracking-widest text-bonedim/60">Title</label>
        <input type="text" id="f-title" class="w-full bg-surface2 border border-surface2 rounded-md px-4 py-2 text-bone focus:ring-1 focus:ring-tape focus:outline-none" />
      </div>
      <div>
        <label for="f-bpm" class="block font-mono text-xs uppercase tracking-widest text-bonedim/60">BPM (optional)</label>
        <input type="number" id="f-bpm" step="0.1" placeholder="120" class="w-full bg-surface2 border border-surface2 rounded-md px-4 py-2 text-bone focus:ring-1 focus:ring-tape focus:outline-none" />
      </div>
      <div>
        <label for="f-genre" class="block font-mono text-xs uppercase tracking-widest text-bonedim/60">Genre</label>
        <select id="f-genre" class="w-full bg-surface2 border border-surface2 rounded-md px-4 py-2 text-bone focus:ring-1 focus:ring-tape focus:outline-none">
          <option value="">Select genre</option>
          <option value="afrobeat">Afrobeat</option>
          <option value="trap">Rap/Trap</option>
          <option value="rage">Underground Rage</option>
          <option value="rnb">R&B</option>
        </select>
      </div>
      <div>
        <label for="f-price" class="block font-mono text-xs uppercase tracking-widest text-bonedim/60">Price (NGN)</label>
        <input type="number" id="f-price" placeholder="5000" class="w-full bg-surface2 border border-surface2 rounded-md px-4 py-2 text-bone focus:ring-1 focus:ring-tape focus:outline-none" />
      </div>
      <div>
        <label for="f-key" class="block font-mono text-xs uppercase tracking-widest text-bonedim/60">Key (optional)</label>
        <input type="text" id="f-key" placeholder="C#m, F, Am" class="w-full bg-surface2 border border-surface2 rounded-md px-4 py-2 text-bone focus:ring-1 focus:ring-tape focus:outline-none" />
      </div>
      <div class="md:col-span-2">
        <label for="f-audio" class="block font-mono text-xs uppercase tracking-widest text-bonedim/60">Audio File (MP3 / WAV)</label>
        <input type="file" id="f-audio" accept="audio/*" class="w-full bg-surface2 border border-surface2 rounded-md px-4 py-2 text-bone focus:ring-1 focus:ring-tape focus:outline-none" />
      </div>
      <div class="md:col-span-2 flex items-center gap-4">
        <button type="submit" id="upload-submit-btn" class="font-mono text-sm uppercase tracking-widest px-6 py-2.5 rounded-md bg-tape text-ink font-bold hover:bg-tape/90 transition">
          Upload Beat
        </button>
        <div id="upload-progress-wrap" class="hidden flex-1 items-center gap-3">
          <div class="flex-1 h-2 bg-surface2 rounded-full overflow-hidden">
            <div id="upload-progress-fill" class="h-full bg-tape transition-all duration-300" style="width:0%"></div>
          </div>
          <span id="upload-progress-pct" class="font-mono text-xs text-bonedim/60">Uploading...</span>
        </div>
      </div>
      <p id="upload-error" class="md:col-span-2 text-tape text-sm hidden"></p>
      <p id="upload-success" class="md:col-span-2 text-green-500 text-sm hidden"></p>
    </form>
  </section>

  <section class="mt-8 flex-1">
    <div class="flex items-center justify-between border-b border-surface2 pb-2">
      <h2 class="font-display text-xl tracking-wide">Manage Beats</h2>
      <span id="admin-empty" class="font-mono text-xs text-bonedim/50">No beats uploaded yet</span>
    </div>
    <div id="admin-beat-list" class="mt-4 space-y-3"></div>
  </section>

  <template id="admin-row-template">
    <article class="bg-surface border border-surface2 rounded-lg p-4 flex flex-col md:flex-row md:items-center gap-4">
      <div class="flex-1 min-w-0">
        <div class="flex items-baseline gap-3 flex-wrap">
          <h3 class="row-title font-display text-lg tracking-wide truncate"></h3>
          <span class="row-meta font-mono text-xs text-bonedim/60"></span>
          <span class="row-price font-mono text-sm text-tape font-bold"></span>
          <span class="row-key font-mono text-xs text-bonedim/60"></span>
        </div>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <button class="admin-play-btn w-9 h-9 rounded-full bg-surface2 border border-surface2 flex items-center justify-center hover:bg-tape/20 hover:border-tape transition">
          <svg class="play-icon w-3 h-3 text-bone" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg class="pause-icon w-3 h-3 text-bone hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>
        <a class="row-download font-mono text-xs uppercase tracking-widest px-3 py-1.5 rounded border border-bonedim/20 text-bonedim/60 hover:text-bone hover:border-tape/40 transition" download>DL</a>
        <button class="row-delete font-mono text-xs uppercase tracking-widest px-3 py-1.5 rounded border border-tape/30 text-tape/60 hover:text-tape hover:border-tape transition">Delete</button>
      </div>
    </article>
  </template>

  <audio id="admin-player" class="hidden"></audio>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ===== CONFIG =====
    var SUPABASE_URL = "https://dxfvzytpfohvhtjsdjokv.supabase.co";
    var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4ZnZ6eXRmcG9odmh0c2pkb3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODM2MTUsImV4cCI6MjA5OTg1OTYxNX0.WbonRSoy9PmRq8UauGpA_UTM2Qs8ZBV0elJMbeigSyQ";
    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    var STORAGE_BUCKET = "beats"; // change to "beats2" if you created a new bucket

    // ===== DEBUG LOGGER =====
    function logDebug(msg) {
      var el = document.getElementById('debug-log');
      if (el) el.textContent += msg + '\n';
      console.log(msg);
    }
    logDebug('🔍 DEBUG STARTED');

    // ===== Test bucket connection =====
    sb.storage.getBucket(STORAGE_BUCKET)
      .then(function(res) {
        if (res.error) {
          logDebug('❌ Bucket error: ' + JSON.stringify(res.error));
        } else {
          logDebug('✅ Bucket exists: ' + JSON.stringify(res.data));
        }
      })
      .catch(function(err) {
        logDebug('❌ Bucket fetch fail: ' + err.message);
      });

    // ===== DOM refs =====
    var listEl = document.getElementById('admin-beat-list');
    var emptyEl = document.getElementById('admin-empty');
    var rowTemplate = document.getElementById('admin-row-template');
    var adminPlayer = document.getElementById('admin-player');

    var GENRE_LABEL = { afrobeat: 'Afrobeat', trap: 'Rap/Trap', rage: 'Underground Rage', rnb: 'R&B' };

    // ===== Fetch beats =====
    function fetchBeats() {
      return sb.from('beats').select('*').order('created_at', { ascending: false })
        .then(function(res) {
          if (res.error) logDebug('❌ Fetch beats error: ' + JSON.stringify(res.error));
          return res.data || [];
        });
    }

    // ===== Build row =====
    var currentPlayingRow = null;

    function togglePlay(beat, row, btn) {
      var isThisPlaying = (currentPlayingRow === row && !adminPlayer.paused);
      adminPlayer.pause();
      if (currentPlayingRow) {
        currentPlayingRow.querySelector('.play-icon').classList.remove('hidden');
        currentPlayingRow.querySelector('.pause-icon').classList.add('hidden');
      }
      if (isThisPlaying) { currentPlayingRow = null; return; }
      adminPlayer.src = beat.audio_url;
      adminPlayer.currentTime = 0;
      adminPlayer.play()['catch'](function(e) { console.error(e); });
      currentPlayingRow = row;
      btn.querySelector('.play-icon').classList.add('hidden');
      btn.querySelector('.pause-icon').classList.remove('hidden');
    }

    adminPlayer.addEventListener('ended', function() {
      if (currentPlayingRow) {
        currentPlayingRow.querySelector('.play-icon').classList.remove('hidden');
        currentPlayingRow.querySelector('.pause-icon').classList.add('hidden');
      }
      currentPlayingRow = null;
    });

    function buildRow(beat) {
      var node = rowTemplate.content.cloneNode(true);
      var row = node.querySelector('article');
      row.querySelector('.row-title').textContent = beat.title || 'Untitled';
      var genreLabel = GENRE_LABEL[(beat.genre || '').toLowerCase()] || beat.genre || '';
      var bpmText = beat.bpm ? (beat.bpm + ' BPM') : 'BPM not set';
      row.querySelector('.row-meta').textContent = genreLabel + ' - ' + bpmText;
      row.querySelector('.row-price').textContent = beat.price ? ('NGN ' + beat.price) : '';
      row.querySelector('.row-key').textContent = beat.key ? ('- ' + beat.key) : '';

      var playBtn = row.querySelector('.admin-play-btn');
      playBtn.addEventListener('click', function() { togglePlay(beat, row, playBtn); });

      var downloadLink = row.querySelector('.row-download');
      downloadLink.href = beat.audio_url || '#';

      row.querySelector('.row-delete').addEventListener('click', function() {
        if (!confirm('Delete "' + (beat.title || 'Untitled') + '"?')) return;
        var storagePath = beat.storage_path;
        var doDelete = function() {
          return sb.from('beats')['delete']().eq('id', beat.id);
        };
        if (storagePath) {
          sb.storage.from(STORAGE_BUCKET).remove([storagePath]).then(function() {
            return doDelete();
          }).then(function(res) {
            if (res.error) { alert('Delete failed: ' + res.error.message); return; }
            renderBeats();
          });
        } else {
          doDelete().then(function(res) {
            if (res.error) { alert('Delete failed: ' + res.error.message); return; }
            renderBeats();
          });
        }
      });

      return row;
    }

    function renderBeats() {
      return fetchBeats().then(function(beats) {
        listEl.innerHTML = '';
        if (beats.length === 0) {
          emptyEl.classList.remove('hidden');
          return;
        }
        emptyEl.classList.add('hidden');
        for (var i = 0; i < beats.length; i++) {
          listEl.appendChild(buildRow(beats[i]));
        }
      });
    }

    // ===== Upload with detailed debug =====
    var uploadForm = document.getElementById('upload-form');
    var uploadBtn = document.getElementById('upload-submit-btn');
    var progressWrap = document.getElementById('upload-progress-wrap');
    var progressFill = document.getElementById('upload-progress-fill');
    var uploadError = document.getElementById('upload-error');
    var uploadSuccess = document.getElementById('upload-success');

    uploadForm.addEventListener('submit', function(e) {
      e.preventDefault();
      logDebug('📤 Upload clicked');
      uploadError.classList.add('hidden');
      uploadSuccess.classList.add('hidden');

      var title = document.getElementById('f-title').value.trim() || 'Untitled';
      var bpmVal = document.getElementById('f-bpm').value;
      var bpm = bpmVal ? Number(bpmVal) : null;
      var genre = document.getElementById('f-genre').value || null;
      var priceVal = document.getElementById('f-price').value;
      var price = priceVal ? Number(priceVal) : 0;
      var key = document.getElementById('f-key').value.trim() || null;
      var file = document.getElementById('f-audio').files[0];

      if (!file) {
        logDebug('❌ No file selected');
        uploadError.textContent = 'Please select an audio file.';
        uploadError.classList.remove('hidden');
        return;
      }

      uploadBtn.disabled = true;
      progressWrap.classList.remove('hidden');
      progressWrap.classList.add('flex');
      progressFill.style.width = '50%';

      var ts = Date.now();
      var safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      var path = 'audio/' + ts + '_' + safeName;

      logDebug('⬆️ Uploading to: ' + STORAGE_BUCKET + '/' + path);
      sb.storage.from(STORAGE_BUCKET).upload(path, file, { cacheControl: '3600', upsert: false })
        .then(function(res) {
          if (res.error) {
            logDebug('❌ Storage upload error: ' + JSON.stringify(res.error));
            throw res.error;
          }
          logDebug('✅ Storage upload success');
          progressFill.style.width = '90%';
          var pub = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
          return { publicUrl: pub.data.publicUrl, path: path };
        })
        .then(function(result) {
          var newBeat = {
            title: title,
            bpm: bpm,
            genre: genre,
            price: price,
            key: key,
            audioUrl: result.publicUrl,
            storagePath: result.path
          };
          logDebug('📝 Inserting into beats table...');
          return sb.from('beats').insert([newBeat]).select();
        })
        .then(function(res) {
          if (res.error) {
            logDebug('❌ Table insert error: ' + JSON.stringify(res.error));
            throw res.error;
          }
          logDebug('✅ Table insert success');
          progressFill.style.width = '100%';
          return renderBeats();
        })
        .then(function() {
          uploadSuccess.textContent = 'Beat uploaded successfully!';
          uploadSuccess.classList.remove('hidden');
          logDebug('🎉 Upload complete');
        })
        .catch(function(err) {
          logDebug('❌ FINAL ERROR: ' + err.message + ' (see details above)');
          uploadError.textContent = 'Upload failed: ' + err.message;
          uploadError.classList.remove('hidden');
        })
        .finally(function() {
          uploadBtn.disabled = false;
          progressWrap.classList.add('hidden');
          progressWrap.classList.remove('flex');
          progressFill.style.width = '0%';
        });
    });

    // ===== Initial render =====
    renderBeats();
  </script>

</body>
</html>
