<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Doctor Fresh</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body { background: #0E0D0C; color: #F2EFE9; font-family: 'Inter', sans-serif; }
    .error-box { background: #ff000020; border: 1px solid #ff4444; padding: 10px; border-radius: 8px; color: #ff6666; margin-top: 10px; white-space: pre-wrap; }
    .success-box { background: #00ff0020; border: 1px solid #44ff44; padding: 10px; border-radius: 8px; color: #66ff66; margin-top: 10px; }
    .info-box { background: #0000ff20; border: 1px solid #4444ff; padding: 10px; border-radius: 8px; color: #6666ff; margin-top: 10px; }
  </style>
</head>
<body class="min-h-screen flex flex-col p-5 max-w-6xl mx-auto">

  <header class="border-b border-gray-700 pb-4 flex items-center justify-between">
    <h1 class="text-2xl font-bold tracking-wide">PROD BY <span style="color:#FF4D00;">DOCTOR FRESH</span></h1>
    <span class="text-xs text-gray-400">Admin</span>
  </header>

  <!-- Diagnostic banner -->
  <div id="diagnostic" class="mt-4 p-3 border border-gray-600 rounded-lg bg-gray-900 text-sm">
    <strong>🔍 Diagnostic:</strong> <span id="diagnostic-text">Checking connection...</span>
  </div>

  <!-- Upload Form -->
  <section class="mt-6 bg-gray-800 border border-gray-700 rounded-xl p-5">
    <h2 class="text-xl font-bold">Upload New Beat</h2>
    <form id="upload-form" class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-xs uppercase text-gray-400">Title</label>
        <input type="text" id="f-title" class="w-full bg-gray-700 border border-gray-600 rounded-md px-4 py-2 text-white focus:ring-1 focus:ring-orange-500 focus:outline-none" />
      </div>
      <div>
        <label class="block text-xs uppercase text-gray-400">BPM (optional)</label>
        <input type="number" id="f-bpm" step="0.1" placeholder="120" class="w-full bg-gray-700 border border-gray-600 rounded-md px-4 py-2 text-white focus:ring-1 focus:ring-orange-500 focus:outline-none" />
      </div>
      <div>
        <label class="block text-xs uppercase text-gray-400">Genre</label>
        <select id="f-genre" class="w-full bg-gray-700 border border-gray-600 rounded-md px-4 py-2 text-white focus:ring-1 focus:ring-orange-500 focus:outline-none">
          <option value="">Select genre</option>
          <option value="afrobeat">Afrobeat</option>
          <option value="trap">Rap/Trap</option>
          <option value="rage">Underground Rage</option>
          <option value="rnb">R&B</option>
        </select>
      </div>
      <div>
        <label class="block text-xs uppercase text-gray-400">Price (₦)</label>
        <input type="number" id="f-price" placeholder="5000" class="w-full bg-gray-700 border border-gray-600 rounded-md px-4 py-2 text-white focus:ring-1 focus:ring-orange-500 focus:outline-none" />
      </div>
      <div>
        <label class="block text-xs uppercase text-gray-400">Key (optional)</label>
        <input type="text" id="f-key" placeholder="C#m, F, Am" class="w-full bg-gray-700 border border-gray-600 rounded-md px-4 py-2 text-white focus:ring-1 focus:ring-orange-500 focus:outline-none" />
      </div>
      <div class="md:col-span-2">
        <label class="block text-xs uppercase text-gray-400">Audio File (MP3 / WAV)</label>
        <input type="file" id="f-audio" accept="audio/*" class="w-full bg-gray-700 border border-gray-600 rounded-md px-4 py-2 text-white focus:ring-1 focus:ring-orange-500 focus:outline-none" />
      </div>
      <div class="md:col-span-2 flex items-center gap-4">
        <button type="submit" id="upload-submit-btn" class="font-bold text-sm uppercase px-6 py-2.5 rounded-md bg-orange-500 text-black hover:bg-orange-400 transition">
          Upload Beat
        </button>
        <div id="upload-progress-wrap" class="hidden flex-1 items-center gap-3">
          <div class="flex-1 h-2 bg-gray-700 rounded-full overflow-hidden">
            <div id="upload-progress-fill" class="h-full bg-orange-500 transition-all duration-300" style="width:0%"></div>
          </div>
          <span id="upload-progress-pct" class="text-xs text-gray-400">0%</span>
        </div>
      </div>
      <div id="status-box" class="md:col-span-2 mt-2"></div>
    </form>
  </section>

  <!-- Manage Beats -->
  <section class="mt-8 flex-1">
    <div class="flex items-center justify-between border-b border-gray-700 pb-2">
      <h2 class="text-xl font-bold">Manage Beats</h2>
      <span id="admin-empty" class="text-xs text-gray-400">No beats uploaded yet</span>
    </div>
    <div id="admin-beat-list" class="mt-4 space-y-3"></div>
  </section>

  <template id="admin-row-template">
    <article class="bg-gray-800 border border-gray-700 rounded-lg p-4 flex flex-col md:flex-row md:items-center gap-4">
      <div class="flex-1 min-w-0">
        <div class="flex items-baseline gap-3 flex-wrap">
          <h3 class="row-title font-bold text-lg truncate"></h3>
          <span class="row-meta text-xs text-gray-400"></span>
          <span class="row-price text-sm text-orange-500 font-bold"></span>
          <span class="row-key text-xs text-gray-400"></span>
        </div>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <button class="admin-play-btn w-9 h-9 rounded-full bg-gray-700 border border-gray-600 flex items-center justify-center hover:bg-gray-600 transition">
          <svg class="play-icon w-3 h-3 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg class="pause-icon w-3 h-3 text-white hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>
        <a class="row-download text-xs uppercase px-3 py-1.5 rounded border border-gray-600 text-gray-400 hover:text-white hover:border-orange-500 transition" download>DL</a>
        <button class="row-delete text-xs uppercase px-3 py-1.5 rounded border border-red-700 text-red-400 hover:text-red-300 hover:border-red-500 transition">Delete</button>
      </div>
    </article>
  </template>

  <audio id="admin-player" class="hidden"></audio>

  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // ============================================================
    //  CONFIG
    // ============================================================
    const SUPABASE_URL = "https://dxfvzytpfohvhtjsdjokv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4ZnZ6eXRmcG9odmh0c2pkb3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODM2MTUsImV4cCI6MjA5OTg1OTYxNX0.WbonRSoy9PmRq8UauGpA_UTM2Qs8ZBV0elJMbeigSyQ";

    // ============================================================
    //  INIT SUPABASE CLIENT
    // ============================================================
    let supabaseClient;
    try {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      console.log('✅ Supabase client created.');
    } catch (err) {
      console.error('❌ Client creation error:', err);
      document.getElementById('diagnostic-text').innerHTML = `❌ Client error: ${err.message}`;
    }

    // ============================================================
    //  DOM REFS
    // ============================================================
    const listEl = document.getElementById('admin-beat-list');
    const emptyEl = document.getElementById('admin-empty');
    const template = document.getElementById('admin-row-template');
    const adminPlayer = document.getElementById('admin-player');
    const statusBox = document.getElementById('status-box');
    const form = document.getElementById('upload-form');
    const uploadBtn = document.getElementById('upload-submit-btn');
    const progressWrap = document.getElementById('upload-progress-wrap');
    const progressFill = document.getElementById('upload-progress-fill');
    const progressPct = document.getElementById('upload-progress-pct');
    const diagnosticText = document.getElementById('diagnostic-text');

    const GENRE_LABEL = { afrobeat:'Afrobeat', trap:'Rap/Trap', rage:'Underground Rage', rnb:'R&B' };

    // ============================================================
    //  HELPERS
    // ============================================================
    function showStatus(msg, isError = true) {
      statusBox.innerHTML = `<div class="${isError ? 'error-box' : 'success-box'}">${msg}</div>`;
      if (isError) console.error(msg);
      else console.log(msg);
    }

    function updateDiagnostic(msg, isError = false) {
      diagnosticText.innerHTML = msg;
      if (isError) console.error('🔍 Diagnostic:', msg);
      else console.log('🔍 Diagnostic:', msg);
    }

    // ============================================================
    //  CONNECTION TEST (runs on load)
    // ============================================================
    async function testConnection() {
      try {
        updateDiagnostic('⏳ Testing connection to Supabase...');
        const { data, error } = await supabaseClient.from('beats').select('count', { count: 'exact', head: true });
        if (error) throw error;
        updateDiagnostic('✅ Connected to Supabase successfully.', false);
      } catch (err) {
        console.error('Connection test error:', err);
        // Check if it's a network error
        if (err.message && (err.message.includes('fetch') || err.message.includes('NetworkError'))) {
          updateDiagnostic('❌ NETWORK ERROR: Cannot reach Supabase. Your hosting may block outbound HTTPS requests to this domain.', true);
          showStatus('❌ Network error: please check your hosting provider allows outbound HTTPS to dxfvzytpfohvhtjsdjokv.supabase.co', true);
        } else {
          updateDiagnostic('❌ Connection test failed: ' + err.message, true);
          showStatus('❌ Connection error: ' + err.message, true);
        }
      }
    }

    // ============================================================
    //  FETCH BEATS
    // ============================================================
    async function fetchBeats() {
      try {
        console.log('🔍 Fetching beats...');
        const { data, error } = await supabaseClient
          .from('beats')
          .select('*')
          .order('created_at', { ascending: false });
        if (error) throw error;
        console.log(`✅ Fetched ${data.length} beats.`);
        return data || [];
      } catch (err) {
        console.error('❌ Fetch beats error:', err);
        // Only show if not already shown by diagnostic
        if (!statusBox.innerHTML) {
          showStatus('❌ Failed to fetch beats: ' + err.message, true);
        }
        return [];
      }
    }

    // ============================================================
    //  RENDER BEATS
    // ============================================================
    async function renderBeats() {
      const beats = await fetchBeats();
      listEl.innerHTML = '';
      if (beats.length === 0) {
        emptyEl.classList.remove('hidden');
        return;
      }
      emptyEl.classList.add('hidden');
      beats.forEach(beat => listEl.appendChild(buildRow(beat)));
    }

    // ============================================================
    //  BUILD ROW
    // ============================================================
    let currentPlayingRow = null;

    function togglePlay(beat, row, btn) {
      const isThisPlaying = currentPlayingRow === row && !adminPlayer.paused;
      adminPlayer.pause();
      if (currentPlayingRow) {
        currentPlayingRow.querySelector('.play-icon').classList.remove('hidden');
        currentPlayingRow.querySelector('.pause-icon').classList.add('hidden');
      }
      if (isThisPlaying) {
        currentPlayingRow = null;
        return;
      }
      adminPlayer.src = beat.audio_url;
      adminPlayer.currentTime = 0;
      adminPlayer.play().catch(err => console.error('Play error:', err));
      currentPlayingRow = row;
      btn.querySelector('.play-icon').classList.add('hidden');
      btn.querySelector('.pause-icon').classList.remove('hidden');
    }

    adminPlayer.addEventListener('ended', () => {
      if (currentPlayingRow) {
        currentPlayingRow.querySelector('.play-icon').classList.remove('hidden');
        currentPlayingRow.querySelector('.pause-icon').classList.add('hidden');
      }
      currentPlayingRow = null;
    });

    function buildRow(beat) {
      const node = template.content.cloneNode(true);
      const row = node.querySelector('article');
      row.querySelector('.row-title').textContent = beat.title;
      const genreLabel = GENRE_LABEL[(beat.genre || '').toLowerCase()] || beat.genre;
      const meta = `${genreLabel} - ${beat.bpm ? beat.bpm + ' BPM' : 'BPM not set'}`;
      row.querySelector('.row-meta').textContent = meta;
      row.querySelector('.row-price').textContent = beat.price ? ('NGN ' + beat.price) : '';
      row.querySelector('.row-key').textContent = beat.key ? ('- ' + beat.key) : '';

      const playBtn = row.querySelector('.admin-play-btn');
      playBtn.addEventListener('click', () => togglePlay(beat, row, playBtn));

      const downloadLink = row.querySelector('.row-download');
      downloadLink.href = beat.audio_url;

      row.querySelector('.row-delete').addEventListener('click', async () => {
        if (!confirm(`Delete "${beat.title}"?`)) return;
        try {
          console.log(`🗑️ Deleting beat ${beat.id}...`);
          const { error } = await supabaseClient.from('beats').delete().eq('id', beat.id);
          if (error) throw error;
          console.log('✅ Deleted.');
          renderBeats();
        } catch (err) {
          console.error('❌ Delete error:', err);
          alert('Delete failed: ' + err.message);
        }
      });

      return row;
    }

    // ============================================================
    //  UPLOAD TO STORAGE
    // ============================================================
    async function uploadToSupabaseStorage(file, onProgress) {
      const timestamp = Date.now();
      const safeName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_');
      const path = `beats/${timestamp}_${safeName}`;

      console.log(`📤 Uploading to storage: ${path}`);
      onProgress(30);

      const { data, error } = await supabaseClient.storage
        .from('beats')
        .upload(path, file, {
          cacheControl: '3600',
          upsert: false,
        });

      if (error) {
        console.error('❌ Storage upload error:', error);
        throw error;
      }

      console.log('✅ Storage upload successful.');
      const { data: publicUrlData } = supabaseClient.storage
        .from('beats')
        .getPublicUrl(path);

      onProgress(100);
      return publicUrlData.publicUrl;
    }

    // ============================================================
    //  SAVE BEAT TO DB
    // ============================================================
    async function saveBeatToSupabase(beat) {
      console.log('💾 Saving beat to database...');
      const { data, error } = await supabaseClient.from('beats').insert([{
        title: beat.title,
        bpm: beat.bpm,
        genre: beat.genre,
        price: beat.price,
        key: beat.key,
        audio_url: beat.audioUrl,
      }]).select();
      if (error) throw error;
      console.log('✅ Beat saved.');
      return data;
    }

    // ============================================================
    //  FORM SUBMIT
    // ============================================================
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusBox.innerHTML = ''; // clear

      const title = document.getElementById('f-title').value.trim() || 'Untitled';
      const bpm = document.getElementById('f-bpm').value ? Number(document.getElementById('f-bpm').value) : null;
      const genre = document.getElementById('f-genre').value || null;
      const price = Number(document.getElementById('f-price').value) || 0;
      const key = document.getElementById('f-key').value.trim() || null;
      const file = document.getElementById('f-audio').files[0];

      if (!file) {
        showStatus('Please select an audio file.', true);
        return;
      }

      uploadBtn.disabled = true;
      progressWrap.classList.remove('hidden');
      progressWrap.classList.add('flex');

      try {
        const audioUrl = await uploadToSupabaseStorage(file, (pct) => {
          progressFill.style.width = pct + '%';
          progressPct.textContent = pct + '%';
        });

        const newBeat = { title, bpm, genre, price, key, audioUrl };
        await saveBeatToSupabase(newBeat);

        showStatus('✅ Beat uploaded successfully!', false);
        form.reset();
        await renderBeats();
      } catch (err) {
        console.error('❌ Upload error:', err);
        showStatus('❌ Upload failed: ' + err.message, true);
      } finally {
        uploadBtn.disabled = false;
        progressWrap.classList.add('hidden');
        progressWrap.classList.remove('flex');
        progressFill.style.width = '0%';
        progressPct.textContent = '0%';
      }
    });

    // ============================================================
    //  INIT
    // ============================================================
    renderBeats();
    testConnection();
  </script>
</body>
</html>
