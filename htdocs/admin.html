<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Doctor Fresh</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#0E0D0C",
            surface: "#1A1816",
            surface2: "#221F1C",
            bone: "#F2EFE9",
            bonedim: "#B8B2A7",
            tape: "#FF4D00",
          },
          fontFamily: {
            display: ["Anton", "sans-serif"],
            body: ["Inter", "sans-serif"],
            mono: ["'JetBrains Mono'", "monospace"],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { background: #0E0D0C; color: #F2EFE9; font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex flex-col p-5 max-w-6xl mx-auto">

  <header class="border-b border-surface2 pb-4 flex items-center justify-between">
    <h1 class="font-display text-2xl tracking-wide">PROD BY <span class="text-tape">DOCTOR FRESH</span></h1>
    <span class="font-mono text-xs text-bonedim/50">Admin</span>
  </header>

  <section class="mt-6 bg-surface border border-surface2 rounded-xl p-5">
    <h2 class="font-display text-xl tracking-wide">Upload New Beat</h2>
    <form id="upload-form" class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label for="f-title" class="block font-mono text-xs uppercase tracking-widest text-bonedim/60">Title *</label>
        <input type="text" id="f-title" class="w-full bg-surface2 border border-surface2 rounded-md px-4 py-2 text-bone focus:ring-1 focus:ring-tape focus:outline-none" required />
      </div>
      <div>
        <label for="f-bpm" class="block font-mono text-xs uppercase tracking-widest text-bonedim/60">BPM (optional)</label>
        <input type="number" id="f-bpm" step="0.1" placeholder="120" class="w-full bg-surface2 border border-surface2 rounded-md px-4 py-2 text-bone focus:ring-1 focus:ring-tape focus:outline-none" />
      </div>
      <div>
        <label for="f-genre" class="block font-mono text-xs uppercase tracking-widest text-bonedim/60">Genre *</label>
        <select id="f-genre" class="w-full bg-surface2 border border-surface2 rounded-md px-4 py-2 text-bone focus:ring-1 focus:ring-tape focus:outline-none" required>
          <option value="">Select genre</option>
          <option value="Afrobeat">Afrobeat</option>
          <option value="Rap/Trap">Rap/Trap</option>
          <option value="Underground Rage">Underground Rage</option>
          <option value="R&B">R&B</option>
        </select>
      </div>
      <div>
        <label for="f-price" class="block font-mono text-xs uppercase tracking-widest text-bonedim/60">Price (₦) *</label>
        <input type="number" id="f-price" placeholder="5000" class="w-full bg-surface2 border border-surface2 rounded-md px-4 py-2 text-bone focus:ring-1 focus:ring-tape focus:outline-none" required />
      </div>
      <div>
        <label for="f-key" class="block font-mono text-xs uppercase tracking-widest text-bonedim/60">Key (optional)</label>
        <input type="text" id="f-key" placeholder="C#m, F, Am" class="w-full bg-surface2 border border-surface2 rounded-md px-4 py-2 text-bone focus:ring-1 focus:ring-tape focus:outline-none" />
      </div>
      <div class="md:col-span-2">
        <label for="f-audio" class="block font-mono text-xs uppercase tracking-widest text-bonedim/60">Audio File (MP3 / WAV) *</label>
        <input type="file" id="f-audio" accept="audio/*" class="w-full bg-surface2 border border-surface2 rounded-md px-4 py-2 text-bone focus:ring-1 focus:ring-tape focus:outline-none" required />
      </div>
      <div class="md:col-span-2 flex items-center gap-4">
        <button type="submit" id="upload-submit-btn" class="font-mono text-sm uppercase tracking-widest px-6 py-2.5 rounded-md bg-tape text-ink font-bold hover:bg-tape/90 transition focus-ring">
          Upload Beat
        </button>
        <div id="upload-progress-wrap" class="hidden flex-1 items-center gap-3">
          <div class="flex-1 h-2 bg-surface2 rounded-full overflow-hidden">
            <div id="upload-progress-fill" class="h-full bg-tape transition-all duration-300" style="width:0%"></div>
          </div>
          <span id="upload-progress-pct" class="font-mono text-xs text-bonedim/60">0%</span>
        </div>
      </div>
      <p id="upload-error" class="md:col-span-2 text-tape text-sm hidden"></p>
      <p id="upload-success" class="md:col-span-2 text-green-500 text-sm hidden"></p>
    </form>
  </section>

  <section class="mt-8 flex-1">
    <div class="flex items-center justify-between border-b border-surface2 pb-2">
      <h2 class="font-display text-xl tracking-wide">Manage Beats</h2>
      <span id="admin-empty" class="font-mono text-xs text-bonedim/50">Loading...</span>
    </div>
    <div id="admin-beat-list" class="mt-4 space-y-3"></div>
  </section>

  <template id="admin-row-template">
    <article class="bg-surface border border-surface2 rounded-lg p-4 flex flex-col md:flex-row md:items-center gap-4">
      <div class="flex-1 min-w-0">
        <div class="flex items-baseline gap-3 flex-wrap">
          <h3 class="row-title font-display text-lg tracking-wide truncate"></h3>
          <span class="row-meta font-mono text-xs text-bonedim/60"></span>
          <span class="row-price font-mono text-sm text-tape font-bold"></span>
          <span class="row-key font-mono text-xs text-bonedim/60"></span>
        </div>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <button class="admin-play-btn w-9 h-9 rounded-full bg-surface2 border border-surface2 flex items-center justify-center hover:bg-tape/20 hover:border-tape transition focus-ring">
          <svg class="play-icon w-3 h-3 text-bone" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg class="pause-icon w-3 h-3 text-bone hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>
        <a class="row-download font-mono text-xs uppercase tracking-widest px-3 py-1.5 rounded border border-bonedim/20 text-bonedim/60 hover:text-bone hover:border-tape/40 transition" download>DL</a>
        <button class="row-delete font-mono text-xs uppercase tracking-widest px-3 py-1.5 rounded border border-tape/30 text-tape/60 hover:text-tape hover:border-tape transition">Delete</button>
      </div>
    </article>
  </template>

  <audio id="admin-player" class="hidden"></audio>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ==================== YOUR SUPABASE CREDENTIALS ====================
    const SUPABASE_URL = "https://dxfvzytpfohvhtjsdjokv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4ZnZ6eXRmcG9odmh0c2pkb3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODM2MTUsImV4cCI6MjA5OTg1OTYxNX0.WbonRSoy9PmRq8UauGpA_UTM2Qs8ZBV0elJMbeigSyQ";

    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ==================== DOM REFS ====================
    const listEl = document.getElementById('admin-beat-list');
    const emptyEl = document.getElementById('admin-empty');
    const template = document.getElementById('admin-row-template');
    const adminPlayer = document.getElementById('admin-player');
    const uploadForm = document.getElementById('upload-form');
    const uploadBtn = document.getElementById('upload-submit-btn');
    const progressWrap = document.getElementById('upload-progress-wrap');
    const progressFill = document.getElementById('upload-progress-fill');
    const progressPct = document.getElementById('upload-progress-pct');
    const uploadError = document.getElementById('upload-error');
    const uploadSuccess = document.getElementById('upload-success');

    let currentPlayingRow = null;

    // ==================== LOAD BEATS ====================
    async function loadBeats() {
      try {
        const { data, error } = await supabase
          .from('beats')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        listEl.innerHTML = '';
        if (!data || data.length === 0) {
          emptyEl.textContent = 'No beats uploaded yet';
          emptyEl.classList.remove('hidden');
          return;
        }
        emptyEl.classList.add('hidden');

        data.forEach(beat => {
          listEl.appendChild(buildRow(beat));
        });
      } catch (err) {
        emptyEl.textContent = '⚠️ Error: ' + err.message;
        emptyEl.classList.remove('hidden');
        console.error(err);
      }
    }

    // ==================== BUILD ROW ====================
    function buildRow(beat) {
      const node = template.content.cloneNode(true);
      const row = node.querySelector('article');

      row.querySelector('.row-title').textContent = beat.title;
      row.querySelector('.row-meta').textContent = `${beat.genre} · ${beat.bpm ? beat.bpm + ' BPM' : 'BPM not set'}`;
      row.querySelector('.row-price').textContent = beat.price ? `₦${beat.price}` : '';
      row.querySelector('.row-key').textContent = beat.key ? `· ${beat.key}` : '';

      const playBtn = row.querySelector('.admin-play-btn');
      const playIcon = playBtn.querySelector('.play-icon');
      const pauseIcon = playBtn.querySelector('.pause-icon');

      playBtn.addEventListener('click', () => {
        if (!beat.audio_url) {
          alert('No audio file.');
          return;
        }
        const isThisPlaying = currentPlayingRow === row && !adminPlayer.paused;
        adminPlayer.pause();
        if (currentPlayingRow) {
          currentPlayingRow.querySelector('.play-icon').classList.remove('hidden');
          currentPlayingRow.querySelector('.pause-icon').classList.add('hidden');
        }
        if (isThisPlaying) {
          currentPlayingRow = null;
          return;
        }
        adminPlayer.src = beat.audio_url;
        adminPlayer.currentTime = 0;
        adminPlayer.play().catch(console.error);
        currentPlayingRow = row;
        playIcon.classList.add('hidden');
        pauseIcon.classList.remove('hidden');
      });

      const downloadLink = row.querySelector('.row-download');
      if (beat.audio_url) downloadLink.href = beat.audio_url;
      else {
        downloadLink.style.opacity = '0.3';
        downloadLink.style.pointerEvents = 'none';
      }

      row.querySelector('.row-delete').addEventListener('click', () => deleteBeat(beat.id, beat.title, beat.audio_url));

      return row;
    }

    adminPlayer.addEventListener('ended', () => {
      if (currentPlayingRow) {
        currentPlayingRow.querySelector('.play-icon').classList.remove('hidden');
        currentPlayingRow.querySelector('.pause-icon').classList.add('hidden');
      }
      currentPlayingRow = null;
    });

    // ==================== DELETE BEAT ====================
    async function deleteBeat(id, title, audioUrl) {
      if (!confirm(`Delete "${title}"?`)) return;
      try {
        if (audioUrl) {
          const fileName = audioUrl.split('/').pop();
          await supabase.storage.from('beats').remove([fileName]);
        }

        const { error } = await supabase
          .from('beats')
          .delete()
          .eq('id', id);

        if (error) throw error;
        loadBeats();
      } catch (err) {
        alert('Delete failed: ' + err.message);
      }
    }

    // ==================== UPLOAD BEAT ====================
    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      uploadError.classList.add('hidden');
      uploadSuccess.classList.add('hidden');

      const title = document.getElementById('f-title').value.trim();
      const bpm = document.getElementById('f-bpm').value ? Number(document.getElementById('f-bpm').value) : null;
      const genre = document.getElementById('f-genre').value;
      const price = Number(document.getElementById('f-price').value);
      const key = document.getElementById('f-key').value.trim() || null;
      const file = document.getElementById('f-audio').files[0];

      if (!title || !genre || !price || !file) {
        uploadError.textContent = 'Title, Genre, Price, and Audio are required.';
        uploadError.classList.remove('hidden');
        return;
      }

      uploadBtn.disabled = true;
      progressWrap.classList.remove('hidden');
      progressWrap.classList.add('flex');

      try {
        // Upload file to Supabase Storage
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const filePath = fileName; // Upload to root of bucket (not public folder)

        const { error: uploadError } = await supabase.storage
          .from('beats')
          .upload(filePath, file);

        if (uploadError) throw uploadError;

        // Get public URL
        const { data: urlData } = supabase.storage
          .from('beats')
          .getPublicUrl(filePath);
        const audioUrl = urlData.publicUrl;

        // Save to database
        const { data, error } = await supabase
          .from('beats')
          .insert([
            { 
              title, 
              bpm, 
              genre, 
              price, 
              key, 
              audio_url: audioUrl 
            }
          ]);

        if (error) throw error;

        uploadSuccess.textContent = '✅ Beat uploaded successfully!';
        uploadSuccess.classList.remove('hidden');
        uploadForm.reset();
        loadBeats();
      } catch (err) {
        uploadError.textContent = 'Upload failed: ' + err.message;
        uploadError.classList.remove('hidden');
        console.error('Upload error:', err);
      } finally {
        uploadBtn.disabled = false;
        progressWrap.classList.add('hidden');
        progressWrap.classList.remove('flex');
        progressFill.style.width = '0%';
        progressPct.textContent = '0%';
      }
    });

    // ==================== LOAD ON START ====================
    loadBeats();
  </script>
</body>
</html>
